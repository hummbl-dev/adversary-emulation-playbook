name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest

      - name: Run mypy type checks
        run: mypy adversary_emulation_playbook/

      - name: Run CLI smoke test
        run: |
          aep-emulate list
          aep-emulate validate apt28
          aep-emulate run apt28 --output /tmp/apt28_report.json

  dep-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check zero third-party runtime deps
        run: |
          pip install -e .
          python -c "
import sys
# hummbl-governance is Tier 1 (stdlib-only core), so it's allowed
allowed = {'hummbl_governance'}
for mod in sys.modules:
    if mod in ('os', 'sys', 'json', 'pathlib', 'dataclasses', 'argparse', 'tempfile', 'time', 'hashlib', 'typing', '__future__', 'importlib'):
        continue
    parts = mod.split('.')
    top = parts[0]
    if top.startswith('_'):
        continue
    if top not in allowed and top not in ('adversary_emulation_playbook', 'tests', 'pytest', '_pytest', 'pluggy', 'packaging', 'iniconfig', 'coverage', 'mypy', 'mypy_extensions'):
        print(f'UNEXPECTED DEP: {top}')
        sys.exit(1)
print('dep-check passed')
"
